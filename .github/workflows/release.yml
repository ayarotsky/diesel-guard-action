name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Update floating major tag and create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MAJOR="v$(echo '${{ github.ref_name }}' | cut -d. -f1)"
          git tag -f "$MAJOR"
          git push origin "$MAJOR" --force
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "Uses diesel-guard ${{ github.ref_name }} binaries."
