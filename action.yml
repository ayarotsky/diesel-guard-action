name: Diesel Guard
description: Check Postgres migrations for dangerous patterns
branding:
  icon: shield
  color: red

inputs:
  path:
    description: Path to DB migrations directory or file
    required: true
    default: 'migrations/'

runs:
  using: 'composite'
  steps:
    - name: Install diesel-guard
      shell: bash
      run: |
        VERSION=$(basename "$GITHUB_ACTION_PATH")
        VERSION="${VERSION#v}"
        if [[ "$VERSION" == "main" ]]; then
          VERSION=$(curl -fsSL -o /dev/null -w '%{url_effective}' \
            "https://github.com/ayarotsky/diesel-guard/releases/latest" \
            | sed 's/.*\/tag\/v//')
        elif ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Error: diesel-guard action must be pinned to a version tag (e.g. uses: ayarotsky/diesel-guard-action@v1.0.0)"
          exit 1
        fi

        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)
        case "$OS/$ARCH" in
          linux/x86_64)  TARGET="x86_64-unknown-linux-gnu" ;;
          linux/aarch64) TARGET="aarch64-unknown-linux-gnu" ;;
          darwin/x86_64) TARGET="x86_64-apple-darwin" ;;
          darwin/arm64)  TARGET="aarch64-apple-darwin" ;;
          *) echo "Unsupported platform: $OS/$ARCH" && exit 1 ;;
        esac

        mkdir -p "$HOME/.local/bin"
        curl -fsSL \
          "https://github.com/ayarotsky/diesel-guard/releases/download/v${VERSION}/diesel-guard-${TARGET}.tar.xz" \
          -o /tmp/diesel-guard.tar.xz
        tar xJf /tmp/diesel-guard.tar.xz --strip-components=1 -C "$HOME/.local/bin"
        rm /tmp/diesel-guard.tar.xz
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Check DB migrations
      shell: bash
      run: diesel-guard check "${{ inputs.path }}"
